name: Release APK

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/hermes.jks

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: hermes.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/hermes-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-${{ github.ref_name }}
          path: app/build/outputs/apk/release/hermes-${{ github.ref_name }}.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/hermes-${{ github.ref_name }}.apk
